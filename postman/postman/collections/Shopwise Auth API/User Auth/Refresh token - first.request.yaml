$kind: http-request
url: "{{base_url}}/api/v1/auth/refresh/"
method: POST
body:
  type: json
  content: '{ "refresh": "{{refresh_token}}" }'
scripts:
  - type: afterResponse
    code: "const before = pm.environment.get(\"refresh_token\");\r

      pm.environment.set(\"old_refresh_token\", before);"
    language: text/javascript
order: 7000
