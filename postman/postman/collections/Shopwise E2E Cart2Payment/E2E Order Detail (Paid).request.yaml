$kind: http-request
url: "{{base_url}}/api/v1/orders/{{order_id}}/"
method: GET
headers:
  Authorization: Bearer {{access_token}}
scripts:
  - type: afterResponse
    code: "pm.test(\"Order detail returns 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Order contains items\", function () {\r

      \    const data = pm.response.json();\r

      \    pm.expect(data.items.length).to.be.above(0);\r

      });\r

      \r

      pm.test(\"Order is Paid\", function () {\r

      \    pm.expect(pm.response.json().status).to.eql(\"PAID\");\r

      });\r

      \r\n"
    language: text/javascript
order: 8000
