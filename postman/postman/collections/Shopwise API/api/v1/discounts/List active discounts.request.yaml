$kind: http-request
description: |
  
  Returns currently active discounts.

  Only discounts that:
  - are active
  - are within their validity period
  - target a product or a leaf category

  are returned.

  Notes:
  - Discounts are read-only.
  - Discounts do not calculate final prices.
  - Category discounts apply only to leaf categories.
url: "{{base_url}}/api/v1/discounts/"
method: GET
headers:
  Accept: application/json
auth:
  type: apikey
  credentials:
    key: sessionid
    value: "{{apiKey}}"
    in: header
examples: ./.resources/List active discounts.resources/examples
order: 2000
