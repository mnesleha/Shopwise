$kind: http-example
request:
  url: "{{baseUrl}}/api/v1/payments/"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: sessionid
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "order_id": 123,
        "result": "success"
      }
response:
  statusCode: 201
  statusText: Created
  body:
    type: text
    content: ""
order: 1000
