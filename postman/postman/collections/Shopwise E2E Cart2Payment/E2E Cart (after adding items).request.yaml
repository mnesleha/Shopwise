$kind: http-request
url: "{{base_url}}/api/v1/cart/"
method: GET
headers:
  Authorization: Bearer {{access_token}}
scripts:
  - type: afterResponse
    code: "pm.test(\"Cart contains items\", function () {\r

      \    const data = pm.response.json();\r

      \    pm.expect(data.items.length).to.be.above(0);\r

      });\r

      \r

      pm.test(\"Cart item has correct structure\", function () {\r

      \    const item = pm.response.json().items[0];\r

      \    pm.expect(item).to.have.property(\"product\");\r

      \    pm.expect(item).to.have.property(\"quantity\");\r

      \    pm.expect(item).to.have.property(\"price_at_add_time\");\r

      });\r\n"
    language: text/javascript
order: 4000
