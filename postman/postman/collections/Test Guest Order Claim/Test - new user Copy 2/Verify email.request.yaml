$kind: http-request
url: "{{base_url}}/api/v1/auth/verify-email/"
method: POST
body:
  type: json
  content: '{ "token": "{{mint_token}}" }'
scripts:
  - type: afterResponse
    code: "pm.test(\"Status is 200\", function () {\r

      \  pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Response claims order\", function () {\r

      \  const json = pm.response.json();\r

      \  pm.expect(json).to.have.property(\"email_verified\");\r

      });"
    language: text/javascript
order: 7000
