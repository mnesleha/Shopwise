$kind: http-request
url: "{{base_url}}/api/v1/auth/me/"
method: GET
headers:
  Authorization: Bearer {{access_token}}
scripts:
  - type: afterResponse
    code: "pm.test(\"Status is 200\", function () {\r

      \  pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Response contains current user identity\", function () {\r

      \  const json = pm.response.json();\r

      \  pm.expect(json).to.have.property(\"id\");\r

      \  pm.expect(json).to.have.property(\"username\");\r

      \r

      \ 
      pm.expect(json.username).to.eql(pm.environment.get(\"auth_username\"));\r

      });\r\n"
    language: text/javascript
order: 6000
