$kind: http-request
url: "{{base_url}}/api/v1/cart/items/"
method: POST
headers:
  Authorization: Bearer {{access_token}}
body:
  type: json
  content: "{\r

    \  \"product_id\": {{product_id}},\r

    \  \"quantity\": 2\r

    }"
scripts:
  - type: afterResponse
    code: "pm.test(\"Add item returns 201\", function () {\r

      \    pm.response.to.have.status(201);\r

      });\r

      \r

      pm.test(\"Item quantity is correct\", function () {\r

      \    const data = pm.response.json();\r

      \    pm.expect(data.quantity).to.eql(2);\r

      });\r

      \r

      pm.test(\"Price snapshot exists\", function () {\r

      \    const data = pm.response.json();\r

      \    pm.expect(data.price_at_add_time).to.exist;\r

      });\r\n"
    language: text/javascript
  - type: beforeRequest
    code: "const fxGet = eval(\"(\" + pm.variables.get(\"fxGet\") + \")\");\r

      \r

      pm.variables.set(\"product_id\", fxGet(\"products.SELLABLE_MOUSE.id\"));"
    language: text/javascript
order: 3000
