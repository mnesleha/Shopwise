$kind: http-request
description: |
  
  Returns details of a single discount.

  Notes:
  - Only active discounts within their validity period are accessible.
  - Discounts are read-only.
url: "{{base_url}}/api/v1/discounts/:id/"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "1904"
    description: A unique integer value identifying this discount.
auth:
  type: apikey
  credentials:
    key: sessionid
    value: "{{apiKey}}"
    in: header
examples: ./.resources/Retrieve discount detail.resources/examples
order: 1000
