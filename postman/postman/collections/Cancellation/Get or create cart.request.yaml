$kind: http-request
url: "{{base_url}}/api/v1/cart/"
method: GET
headers:
  Authorization: Bearer {{access_token}}
scripts:
  - type: afterResponse
    code: "pm.test(\"Get cart returns 200 or 201\", function () {\r

      \    pm.expect(pm.response.code).to.be.oneOf([200, 201]);\r

      });\r

      \r

      pm.test(\"Cart has ACTIVE status\", function () {\r

      \    const data = pm.response.json();\r

      \    pm.expect(data.status).to.eql(\"ACTIVE\");\r

      });\r

      \r

      \r

      \r\n"
    language: text/javascript
order: 2000
