$kind: http-request
url: "{{base_url}}/api/v1/cart/checkout/"
method: POST
headers:
  - key: Cookie
    value: sessionid={{sessionid}}
  - key: Cookie
    value: csrftoken={{csrftoken}}
  - key: X-CSRFToken
    value: "{{csrftoken}}"
scripts:
  - type: afterResponse
    code: "pm.test(\"Checkout without active cart fails\", function () {\r

      \    pm.response.to.have.status(400);\r

      });\r\n"
    language: text/javascript
order: 6000
