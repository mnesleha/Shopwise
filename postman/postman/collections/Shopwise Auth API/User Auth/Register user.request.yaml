$kind: http-request
url: "{{base_url}}/api/v1/auth/register/"
method: POST
body:
  type: json
  content: '{"username":"{{auth_username}}","password":"{{auth_password}}"}'
scripts:
  - type: afterResponse
    code: "pm.test(\"Status is 201\", function () {\r

      \  pm.response.to.have.status(201);\r

      });\r

      \r

      pm.test(\"Response has basic user info and no password\", function () {\r

      \  const json = pm.response.json();\r

      \  pm.expect(json).to.have.property(\"id\");\r

      \  pm.expect(json).to.have.property(\"username\");\r

      \r

      \  pm.expect(json.username).to.eql(pm.variables.get(\"auth_username\") ||
      pm.environment.get(\"auth_username\"));\r

      \  pm.expect(json).to.not.have.property(\"password\");\r

      });\r\n"
    language: text/javascript
order: 2000
