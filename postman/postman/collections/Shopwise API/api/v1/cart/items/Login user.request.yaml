$kind: http-request
description: Login endpoint intended for automated testing and QA workflows.
  Creates a session and sets authentication cookies.
url: "{{base_url}}/api/v1/auth/login/"
method: POST
headers:
  Content-Type: application/json
  X-CSRFToken: "{{csrftoken}}"
body:
  type: json
  content: |-
    {
      "password": "carolgreen",
      "username": "carolgreen"
    }
scripts:
  - type: afterResponse
    code: "pm.test(\"login successful\", function () {\r

      \    pm.response.to.have.status(200);\r

      });"
    language: text/javascript
examples: ./.resources/Login user.resources/examples
order: 1000
