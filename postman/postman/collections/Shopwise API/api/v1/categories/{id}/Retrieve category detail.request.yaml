$kind: http-request
description: |
  
  Returns details of a single category.

  Notes:
  - Categories are read-only.
  - Both parent and leaf categories can be retrieved by ID.
url: "{{base_url}}/api/v1/categories/:id/"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: "1904"
    description: A unique integer value identifying this category.
auth:
  type: apikey
  credentials:
    key: sessionid
    value: "{{apiKey}}"
    in: header
examples: ./.resources/Retrieve category detail.resources/examples
order: 1000
