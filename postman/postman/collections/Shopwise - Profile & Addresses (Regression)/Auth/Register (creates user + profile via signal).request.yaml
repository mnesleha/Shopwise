$kind: http-request
url: "{{baseUrl}}/api/auth/register/"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "{{email}}",
      "password": "{{password}}"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Register returns 201/200', function () {
        pm.expect([200, 201]).to.include(pm.response.code);
      });
    language: text/javascript
order: 1000
