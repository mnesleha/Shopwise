$kind: http-request
url: "{{base_url}}/api/v1/cart/items/"
method: POST
headers:
  X-Cart-Token: "{{cart_token}}"
body:
  type: json
  content: "{\r

    \  \"product_id\": 1,\r

    \  \"quantity\": 3\r

    }"
scripts:
  - type: afterResponse
    code: "pm.test(\"Add item returns 201\", function () {\r

      \    pm.response.to.have.status(201);\r

      });\r

      \r

      pm.test(\"Item quantity is correct\", function () {\r

      \    const data = pm.response.json();\r

      \    pm.expect(data.quantity).to.eql(2);\r

      });\r

      \r

      pm.test(\"Price snapshot exists\", function () {\r

      \    const data = pm.response.json();\r

      \    pm.expect(data.price_at_add_time).to.exist;\r

      });\r\n"
    language: text/javascript
order: 2000
