site_name: Shopwise Showcase Project Documentation
site_url: https://github.io

theme:
  name: material # theme
  palette:
    primary: indigo # colors
    accent: indigo
  features:
    - navigation.sections # menu sections
    - navigation.expand # automatic menu expansion

markdown_extensions: # mermaid support
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - js/mermaid-init.js

nav: # define the left panel
  - Index: index.md
  - Demo scenarios:
      - Demo scenarios index: demo/readme.md
      - Guest user flow: demo/scenarios/Guest order flow.md
      - Auth Order Flow with Order History: demo/scenarios/Auth order flow with order history.md
      - Cart merge: demo/scenarios/Cart merge.md
      - Order claim: demo/scenarios/Order claim.md
      - Registration and Email Verification: demo/scenarios/Registration and email verification.md
      - Backoffice Shipment Processing: demo/scenarios/Backoffice shipment processing.md
      - Backoffice Promotion and Offer: demo/scenarios/Backoffice promotion and offer.md
  - API:
      - OpenAPI: api/OpenAPI.md
  - Architecture:
      - System Architecture Overview: architecture/System Architecture Overview.md
      - Current Architecture Baseline: architecture/Current Architecture Baseline.md
      - Domain Model: architecture/Domain Model.md
      - ER Diagram: architecture/ER Diagram.md
      - Cart-Order Lifecycle: architecture/Cart-Order Lifecycle.md
      - Inventory Reservation Lifecycle: architecture/Inventory Reservation Lifecycle.md
      - Postman Anonymous Cart Testing: architecture/Postman Anonymous Cart Testing.md
  - CI-CD:
      - Pipeline Overview: ci-cd/Pipeline Overview.md
      - Postman CLI in CI: ci-cd/Postman CLI in CI.md
  - Architectural Decisions Index: decisions/readme.md
