$kind: http-request
description: |
  
  Returns the user's active cart.

  Behavior:
  - If an ACTIVE cart exists, it is returned.
  - If no ACTIVE cart exists, a new cart is created automatically.

  Important notes:
  - This endpoint has a side-effect (cart creation).
  - The operation is not strictly read-only.
  - This behavior is intentional to simplify frontend integration.

  HTTP semantics:
  - 200 OK: an existing active cart is returned
  - 201 Created: a new active cart was created (target behavior)

  Note:
  - Current implementation always returns 200 OK.
  - Returning 201 Created when a cart is created is a planned improvement.
url: "{{base_url}}/api/v1/cart/"
method: GET
headers:
  Accept: application/json
auth:
  type: apikey
  credentials:
    key: sessionid
    value: "{{apiKey}}"
    in: header
scripts:
  - type: afterResponse
    code: "pm.test(\"returns 200 OK\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"response has cart id\", function () {\r

      \    const data = pm.response.json();\r

      \    pm.expect(data).to.have.property(\"id\");\r

      \    pm.expect(data.id).to.be.a(\"number\");\r

      });\r

      \r

      pm.test(\"cart status is ACTIVE\", function () {\r

      \    const data = pm.response.json();\r

      \    pm.expect(data.status).to.eql(\"ACTIVE\");\r

      });\r

      \r

      pm.test(\"cart contains items array\", function () {\r

      \    const data = pm.response.json();\r

      \    pm.expect(data).to.have.property(\"items\");\r

      \    pm.expect(data.items).to.be.an(\"array\");\r

      });\r\n"
    language: text/javascript
examples: ./.resources/Retrieve active cart.resources/examples
order: 3000
