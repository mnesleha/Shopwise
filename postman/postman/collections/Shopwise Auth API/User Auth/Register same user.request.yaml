$kind: http-request
url: "{{base_url}}/api/v1/auth/register/"
method: POST
body:
  type: json
  content: '{"username":"{{auth_username}}","password":"{{auth_password}}"}'
scripts:
  - type: afterResponse
    code: "pm.test(\"Duplicate username returns 400\", function () {\r

      \  pm.response.to.have.status(400);\r

      });\r

      \r

      pm.test(\"Duplicate username returns VALIDATION_ERROR with username
      field\", function () {\r

      \  const json = pm.response.json();\r

      \  pm.expect(json.code).to.eql(\"VALIDATION_ERROR\");\r

      \  pm.expect(json).to.have.property(\"errors\");\r

      \  pm.expect(json.errors).to.have.property(\"username\");\r

      });\r

      \r\n"
    language: text/javascript
order: 3000
