$kind: http-request
url: "{{base_url}}/api/v1/auth/csrf/"
method: GET
headers:
  - key: Cookie
    value: sessionid={{sessionid}}
  - key: Cookie
    value: csrftoken={{csrftoken}}
  - key: X-CSRFToken
    value: "{{csrftoken}}"
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: "const csrfToken = pm.cookies.get('csrftoken');\r

      \r

      if (!csrfToken) {\r

      \    console.warn(\"CSRF token not found in cookies\");\r

      } else {\r

      \    pm.environment.set('csrftoken', csrfToken);\r

      }"
    language: text/javascript
order: 2000
