$kind: http-request
url: "{{base_url}}/api/v1/cart/"
method: GET
headers:
  Cookie: sessionid=mnnm798zmdl1kxxzzh9hpz87pawezhon
scripts:
  - type: afterResponse
    code: "pm.test(\"Get cart returns 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Cart has ACTIVE status\", function () {\r

      \    const data = pm.response.json();\r

      \    pm.expect(data.status).to.eql(\"ACTIVE\");\r

      });\r

      \r

      pm.test(\"Cart ID is stored\", function () {\r

      \    const data = pm.response.json();\r

      \    pm.environment.set(\"cart_id\", data.id);\r

      });\r\n"
    language: text/javascript
order: 1000
